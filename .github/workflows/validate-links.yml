name: Validate links

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Kiểm tra toàn vẹn link giữa các tầng (manifest/links/capability)
        run: python3 _meta/validate_links.py
