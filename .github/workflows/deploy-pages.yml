name: Deploy portal to GitHub Pages

# Tự động dựng lại docs/data.json từ cấu trúc repo và xuất bản cổng thông tin
# lên GitHub Pages mỗi khi có thay đổi trên nhánh chính.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy một lượt deploy tại một thời điểm
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sinh data.json từ cấu trúc thư mục
        run: python3 _meta/build_site.py

      - name: Chặn Jekyll xử lý (giữ nguyên tệp)
        run: touch docs/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (thư mục docs)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
