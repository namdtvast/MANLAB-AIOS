<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>M10 · Đảm bảo hiệu lực kết quả (P10)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">
        <svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="30" height="30" rx="8" fill="var(--accent)"/>
          <circle cx="16" cy="16" r="9" stroke="var(--accent-ink)" stroke-width="1.6" opacity="0.55"/>
          <circle cx="16" cy="16" r="4.4" stroke="var(--accent-ink)" stroke-width="1.6"/>
          <path d="M16 3.5v6M16 22.5v6M3.5 16h6M22.5 16h6" stroke="var(--accent-ink)" stroke-width="1.6"/>
          <circle cx="16" cy="16" r="1.5" fill="var(--accent-ink)"/>
        </svg>
        <div><b>ManLab · ETV</b><span>Hệ thống phòng thí nghiệm</span></div>
      </div>
      <div class="navsec">Module M10 · Đảm bảo hiệu lực</div>
      <nav class="nav" id="nav">
        <button data-screen="list" aria-current="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Danh sách hồ sơ</button>
        <button data-screen="new"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Tạo hồ sơ</button>
        <button data-screen="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>Dashboard KPI</button>
      </nav>
      <div class="navsec" style="margin-top:8px">Đóng vai (thử phân quyền)</div>
      <div class="nav">
        <select class="rolesel" id="role">
          <option value="NTH">NTH — Người thực hiện</option>
          <option value="LDP" selected>LĐP — Soát xét</option>
          <option value="LDV">LĐV — Phê duyệt/Công bố</option>
          <option value="QLCL">QLCL — Chất lượng</option>
          <option value="QTHT">QTHT — Quản trị/ATTT</option>
        </select>
        <div class="rolehint">Đổi vai để thấy nút soát xét/phê duyệt bật/tắt theo R8.</div>
      </div>
      <div class="foot">
        <div style="font-weight:600;color:var(--ink)" id="roleName">Trần Thị Hoa</div>
        <div style="font-size:11px;color:var(--ink-3)" id="roleDesc">Lãnh đạo phòng — soát xét</div>
        <button class="btn ghost" id="reset" style="margin-top:10px;padding:6px 10px;font-size:12px">↺ Đặt lại dữ liệu mẫu</button>
      </div>
    </aside>
    <div class="main">
      <div class="top">
        <div class="crumb">MANLAB-AIOS <span>/</span> M10 <span>/</span> <b id="crumb">Danh sách hồ sơ</b></div>
        <div class="spacer"></div>
        <button class="iconbtn" id="theme" title="Đổi giao diện sáng/tối" aria-label="Đổi giao diện">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
        </button>
      </div>
      <div class="wrap"><div id="view"></div></div>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
